<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Catalog | Noor Academia</title>
    <link rel="icon" type="image/png" href="./assets/logo/favicon/favicon.ico">
    <link rel="apple-touch-icon" href="./assets/logo/favicon/favicon.png">
    <link rel="stylesheet" href="./assets/css/style.css">
    
    <script src="./js/loader.js" defer></script>
</head>
<body>

    <div id="layout-wrapper"></div>

    <template id="page-content"> <!-- This content will be injected into #main-content of the loaded template -->
        <section class="announcement-bar">
            <div class="container">
                <p>Exciting News! All courses are launching soon. Get ready to start your learning journey!</p>
                <button class="dismiss-banner-btn" aria-label="Dismiss announcement">&times;</button>
            </div>
        </section>
        <section class="search-section">
            <div class="container">
                <input type="text" id="course-search-input" placeholder="Search for courses by title...">
            </div>
        </section>
        <section class="course-catalog">
            <div class="container" style="display: block;">
                <div class="course-grid" id="course-grid-container">
                    <!-- Course cards will be dynamically inserted here by loader.js -->
                </div>
            </div>
        </section>
    </template>

</body>
</html>
