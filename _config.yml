title: Programming Course | Noor Academia
url: "https://nooracademia.in"
baseurl: ""

# Disable default themes
theme: null

# --- THE CRITICAL FIX ---
sass:
  sass_dir: _sass
  style: compressed
# ------------------------

# Path for synced icons
vault_url: "/assets/vault"

plugins:
  - jekyll-seo-tag

# Ensure Jekyll doesn't ignore our synced folders
include:
  - _data
  - _layouts
  - _includes
  - _sass
  - assets
