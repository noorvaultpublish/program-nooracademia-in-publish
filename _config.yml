title: Programming Course | Noor Academia
url: "https://nooracademia.in"
baseurl: ""

# Disable default themes to use our Vault theme
theme: null

# Explicitly point to the local folder synced from the Vault
sass:
  sass_dir: _sass
  style: compressed

# Root path for synced assets (icons, etc.)
vault_url: "/assets/vault"

plugins:
  - jekyll-seo-tag

# Ensure Jekyll includes all the folders we are syncing
include:
  - _data
  - _layouts
  - _includes
  - _sass
  - assets
