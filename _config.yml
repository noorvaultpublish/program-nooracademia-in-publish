# Site Settings
title: Noor Academia Vault
description: Centralized template and design assets for Noor Academia subdomains.
url: "https://nooracademia-owner.github.io"
baseurl: "/vault-noor-academia-in" # Matches the GitHub repository name

# Personalization
author:
  name: Noor Academia Team
  email: info@nooracademia.in

# --- Custom Variable ---
# Even inside the vault, defining this allows you to test paths locally
vault_url: "https://raw.githubusercontent.com/nooracademia-owner/vault-noor-academia-in/main/"

# Build Settings
markdown: kramdown
# Since this IS the vault, you don't need a remote theme here
theme: minima 

# Folder Exclusions
exclude:
  - .obsidian/    # Keeps your Obsidian settings private
  - README.md
  - LICENSE
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .vscode
