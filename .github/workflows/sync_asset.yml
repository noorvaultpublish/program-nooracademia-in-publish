name: Sync assets from vault

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      # Checkout public repo
      - name: Checkout program repo
        uses: actions/checkout@v4

      # Checkout private repo
      - name: Checkout vault repo
        uses: actions/checkout@v4
        with:
          repository: nooracademia-owner/vault-noor-academia-in
          token: ${{ secrets.PRIVATE_TOKEN }}
          path: vault

      # Copy assets folder
      - name: Copy assets
        run: |
          mkdir -p assets
          cp -r vault/assets/* assets/

      # Commit and push safely
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Sync with remote
          git fetch origin main
          git reset --hard origin/main

          # Add copied files
          git add assets

          # Commit only if there are changes
          git commit -m "Sync assets from vault" || echo "No changes"

          # Push changes
          git push origin main
