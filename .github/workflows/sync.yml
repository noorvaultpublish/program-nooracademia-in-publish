# 1. Update the file content with the correct secret name
@'
name: Sync to Publish Repo
on:
  push:
    branches:
      - main
  workflow_dispatch: # This adds the manual "Run workflow" button

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Publish
        run: |
          git remote add target https://x-access-token:${{ secrets.PUBLISH_P_TOKEN }}@github.com/nooracademia-owner/program-nooracademia-in-publish.git
          git push target main:main --force
'@ | Out-File -FilePath .github/workflows/sync.yml -Encoding utf8

# 2. Push the changes to GitHub
git add .github/workflows/sync.yml
git commit -m "Update sync secret to PUBLISH_P_TOKEN and add manual trigger"
git push origin main