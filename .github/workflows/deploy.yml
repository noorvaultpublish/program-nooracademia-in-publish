name: Noor Academia Secure Deploy

on:
  push:
    branches: ["main"]
  repository_dispatch:
    types: [vault_updated]
  workflow_dispatch:

# Permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Program Repo
        uses: actions/checkout@v4

      # 1. Generate Token with access to both Vault and Program repos
      - name: Generate Temporary Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "vault-noor-academia-in, program-nooracademia.in"

      # 2. Securely clone the Private Vault
      - name: Checkout Private Vault
        uses: actions/checkout@v4
        with:
          repository: nooracademia-owner/vault-noor-academia-in
          token: ${{ steps.generate_token.outputs.token }}
          path: temp_vault

      # 3. Synchronize Theme, Data, and Assets
      - name: Sync Theme and Assets
        run: |
          # Create all necessary destination folders
          mkdir -p assets/css assets/vault _layouts _includes _sass _data

          # Sync Sass logic (Required for assets/css/style.scss to work)
          if [ -d "temp_vault/_sass" ]; then cp -rfv temp_vault/_sass/* ./_sass/; fi
          
          # Sync Theme Templates
          if [ -d "temp_vault/_layouts" ]; then cp -rfv temp_vault/_layouts/* ./_layouts/; fi
          if [ -d "temp_vault/_includes" ]; then cp -rfv temp_vault/_includes/* ./_includes/; fi
          
          # Sync Global Data
          if [ -f "temp_vault/_data/vault.json" ]; then cp -fv temp_vault/_data/vault.json ./_data/; fi
          
          # Sync All Assets (Icons, Images) to the vault subfolder
          if [ -d "temp_vault/assets" ]; then cp -rfv temp_vault/assets/* ./assets/vault/; fi
          
          # Cleanup
          rm -rf temp_vault

      # 4. Jekyll Build Process
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      # 5. Deployment
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
