name: Noor Academia Secure Deploy

on:
  push:
    branches: ["main"]
  repository_dispatch:
    types: [vault_updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Ensures we use the latest Node environment for Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Program Repo
        uses: actions/checkout@v4

      - name: Generate Temporary Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          # Ensure these variables are set in your Repo Settings > Secrets and Variables
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "vault-noor-academia-in, program-nooracademia.in"

      - name: Checkout Private Vault
        uses: actions/checkout@v4
        with:
          repository: nooracademia-owner/vault-noor-academia-in
          token: ${{ steps.generate_token.outputs.token }}
          path: temp_vault

      - name: Sync Brand Components
        run: |
          # 1. Create the folders. -p ensures they are created only if missing.
          mkdir -p _layouts _includes _data assets/vault/assets
          
          # 2. Sync templates and data
          [ -d "temp_vault/_layouts" ] && cp -rf temp_vault/_layouts/* ./_layouts/
          [ -d "temp_vault/_includes" ] && cp -rf temp_vault/_includes/* ./_includes/
          [ -f "temp_vault/_data/vault.json" ] && cp -f temp_vault/_data/vault.json ./_data/
          
          # 3. Sync Logos/Icons/Images
          # This copies the CONTENT of Vault/assets/ into Local/assets/vault/assets/
          if [ -d "temp_vault/assets" ]; then
            cp -rf temp_vault/assets/* ./assets/vault/assets/
          fi
          
          # 4. Verification: Look for the icon in the logs
          echo "--- Content of assets/vault/assets ---"
          ls -R assets/vault/assets/
          
          rm -rf temp_vault

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
