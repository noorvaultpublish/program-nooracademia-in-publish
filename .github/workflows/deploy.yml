name: Noor Academia Secure Deploy

on:
  push:
    branches: ["main"]
  # Allows the Vault repo to trigger this build automatically
  repository_dispatch:
    types: [vault_updated]
  # Allows you to click "Run workflow" manually in the Actions tab
  workflow_dispatch:

# Standard permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Program Repo
        uses: actions/checkout@v4

      # 1. Generate a 60-minute token from your GitHub App
      - name: Generate Temporary Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # 2. Securely clone the Private Vault
      - name: Checkout Private Vault
        uses: actions/checkout@v4
        with:
          repository: nooracademia-owner/vault-noor-academia-in
          token: ${{ steps.generate_token.outputs.token }}
          path: temp_vault

      # 3. Synchronize Theme, Data, and Assets from Vault to Program Repo
      - name: Sync Theme and Assets
        run: |
          # Sync Theme Folders (Overwrites existing to ensure brand consistency)
          cp -rf temp_vault/_layouts .
          cp -rf temp_vault/_includes .
          cp -rf temp_vault/_sass .
          
          # Sync Global Data
          mkdir -p _data
          cp -f temp_vault/_data/vault.json _data/vault.json 2>/dev/null || echo "No vault.json found"
          
          # Sync Assets to the Root Vault folder
          mkdir -p assets/vault
          cp -rf temp_vault/assets/* assets/vault/
          
          # Cleanup the temporary folder
          rm -rf temp_vault

      # 4. Jekyll Build Process
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      # 5. Deployment to GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
