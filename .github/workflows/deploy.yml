name: Noor Academia Secure Deploy

on:
  push:
    branches: ["main"]
  repository_dispatch:
    types: [vault_updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Program Repo
        uses: actions/checkout@v4

      # 1. Generate Token with explicit access to BOTH repos
      - name: Generate Temporary Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Explicitly request access to the Vault repo to prevent 404
          repositories: "vault-noor-academia-in, program-nooracademia.in"

      # 2. Securely clone the Private Vault
      - name: Checkout Private Vault
        uses: actions/checkout@v4
        with:
          # Ensure this is the exact OWNER/REPO name from your browser URL
          repository: nooracademia-owner/vault-noor-academia-in
          token: ${{ steps.generate_token.outputs.token }}
          path: temp_vault

      # 3. Synchronize Theme, Data, and Assets
      - name: Sync Theme and Assets
        run: |
          # Use -v (verbose) to see exactly what is being copied in the logs
          cp -rfv temp_vault/_layouts .
          cp -rfv temp_vault/_includes .
          cp -rfv temp_vault/_sass .
          
          mkdir -p _data
          cp -fv temp_vault/_data/vault.json _data/vault.json 2>/dev/null || echo "No vault.json found"
          
          mkdir -p assets/vault
          cp -rfv temp_vault/assets/* assets/vault/
          
          rm -rf temp_vault

      # 4. Jekyll Build Process
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      # 5. Deployment
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
