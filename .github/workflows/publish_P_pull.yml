name: Sync Private Repo
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

jobs:
  sync-and-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout destination
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLISH_P_TOKEN }}
          fetch-depth: 0 

      - name: Process Sync Logic
        env:
          SOURCE_REPO: "https://x-access-token:${{ secrets.PUBLISH_P_TOKEN }}@github.com/nooracademia-owner/program-nooracademia.in.git"
          PUBLIC_URL: "https://program.nooracademia.in"
          DOMAIN_NAME: "program.nooracademia.in"
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 1. SETUP PRIVATE SOURCE
          git remote add upstream "$SOURCE_REPO"
          git fetch upstream main

          # 2. CHECK FOR UPDATES
          CHANGED_FILES=$(git diff --name-only origin/main upstream/main | wc -l || echo "0")
          if [ "$CHANGED_FILES" -eq "0" ]; then
            echo "No updates found. Exiting."
            exit 0
          fi

          # 3. HARD RESET 'fetchdata' BRANCH
          git checkout -B fetchdata
          git reset --hard upstream/main
          git push origin fetchdata --force

          # 4. BACKUP 'main' TO 'fallback'
          git checkout main
          git checkout -B fallback
          git push origin fallback --force
          git checkout main

          # 5. UPDATE 'main' FROM 'fetchdata'
          git merge fetchdata --strategy-option theirs -m "Sync: Updates from fetchdata"
          
          # Force ensure CNAME exists on main after merge
          echo "$DOMAIN_NAME" > CNAME
          git add CNAME
          git commit --amend --no-edit || git commit -m "Fix: Ensure CNAME for domain"
          git push origin main --force

          # 6. VERIFY URL STATUS & DNS
          echo "Waiting 30 seconds for GitHub Pages deployment and DNS..."
          sleep 30
          STATUS_CODE=$(curl -o /dev/null -s -w "%{http_code}" "$PUBLIC_URL" || echo "OFFLINE")
          
          if [ "$STATUS_CODE" != "200" ]; then
            echo "🚨 ALERT: $PUBLIC_URL returned $STATUS_CODE."
            
            # ATTEMPT DNS FIX: Re-write CNAME and push again
            echo "Attempting DNS repair..."
            echo "$DOMAIN_NAME" > CNAME
            git add CNAME
            git commit -m "Fix: Restore Custom Domain DNS Setting"
            git push origin main
            
            sleep 20
            RETRY_STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$PUBLIC_URL" || echo "OFFLINE")
            
            if [ "$RETRY_STATUS" != "200" ]; then
              echo "🚨 REPAIR FAILED. INITIATING FULL ROLLBACK."
              git reset --hard fallback
              git push origin main --force
              echo "ROLLBACK_EVENT=true" >> $GITHUB_ENV
            fi
          else
            echo "✅ Website is UP at $DOMAIN_NAME."
          fi

      # 7. EMAIL NOTIFICATION (STILL COMMENTED OUT)
      # - name: Send Email on Failure
      #   if: env.ROLLBACK_EVENT == 'true'
      #   ... (email code)
