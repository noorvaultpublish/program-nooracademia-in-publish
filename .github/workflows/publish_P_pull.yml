name: Sync Private Repo
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout destination
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLISH_P_TOKEN }}
          fetch-depth: 0 

      - name: Backup to Fallback and Sync
        env:
          SOURCE_REPO: "https://x-access-token:${{ secrets.PUBLISH_P_TOKEN }}@github.com/nooracademia-owner/program-nooracademia.in.git"
          PUBLIC_URL: "https://program-nooracademia.in"
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 1. CREATE BACKUP TO FALLBACK BRANCH
          # This saves your current 'main' data to 'fallback' before any changes happen
          echo "Creating safety backup to fallback branch..."
          git checkout -B fallback
          git push origin fallback --force
          git checkout main

          # 2. Setup Remote and Fetch
          git remote add upstream "$SOURCE_REPO"
          git fetch upstream main || { echo "❌ Failed to fetch from private repo"; exit 0; }

          # 3. Calculate changes
          CHANGED_FILES=$(git diff --name-only HEAD upstream/main | wc -l || echo "0")
          
          # 4. Initiate Replace/Merge
          # Strategy 'theirs' ensures private repo overwrites conflicts in main
          git merge upstream/main --strategy-option theirs --allow-unrelated-histories -m "Sync: Update from private repo" || echo "⚠️ Merge skipped"

          # 5. Protect Workflows
          # Restore .github from the backup we just made
          git checkout fallback -- .github/ || echo "ℹ️ Workflows already protected"

          # 6. Check Website status
          STATUS_CODE=$(curl -o /dev/null -s -w "%{http_code}" "$PUBLIC_URL" || echo "OFFLINE")

          # 7. Push Changes to Main
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Automated Sync: $CHANGED_FILES files updated"
            git push origin main || echo "❌ Push to main failed"
            SYNC_RESULT="✅ Changes Pushed to Main"
          else
            SYNC_RESULT="ℹ️ Main is already up to date"
            CHANGED_FILES=0
          fi

          # 8. Generate Report
          echo "### 🚀 Sync & Backup Report" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backup Status** | 📦 Saved to 'fallback' branch |" >> $GITHUB_STEP_SUMMARY
          echo "| **Files Updated** | $CHANGED_FILES |" >> $GITHUB_STEP_SUMMARY
          echo "| **Public URL Status** | $STATUS_CODE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Final Action** | $SYNC_RESULT |" >> $GITHUB_STEP_SUMMARY
