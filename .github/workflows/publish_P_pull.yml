name: Sync Private Repo
on:
  workflow_dispatch:
  schedule:
    # Runs at minute 0 of every 4th hour
    - cron: '0 */4 * * *'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
    steps:
      - name: Checkout destination
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLISH_P_TOKEN }}
          fetch-depth: 0

      - name: Sync Changes from Source
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 1. Add and fetch the private source
          git remote add source https://x-access-token:${{ secrets.PUBLISH_P_TOKEN }}@github.com/nooracademia-owner/program-nooracademia.in.git
          git fetch source main

          # 2. Merge changes from source/main into current branch
          # '--strategy-option theirs' ensures that if there's a conflict, the private repo wins.
          # '--allow-unrelated-histories' is used if the repos started differently.
          git merge source/main --strategy-option theirs --allow-unrelated-histories -m "Sync: Update changed files from private repo"

          # 3. Ensure your .github folder (workflows) stays untouched
          # This pulls the workflow files back from your last local commit
          git checkout HEAD@{1} -- .github/

          # 4. Push updates
          git push origin main
