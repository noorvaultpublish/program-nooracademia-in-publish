name: Sync Private Repo
on:
  workflow_dispatch:
  schedule:
    # Runs at minute 0 of every 4th hour
    - cron: '0 */4 * * *'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
    steps:
      - name: Checkout destination
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLISH_P_TOKEN }}
          fetch-depth: 0

      - name: Force Sync from Source
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Add the private source remote
          git remote add source https://x-access-token:${{ secrets.PUBLISH_P_TOKEN }}@github.com/nooracademia-owner/program-nooracademia.in.git
          git fetch source main

          # 1. Reset the index to the private repo's main branch
          git reset --hard source/main

          # 2. Restore the .github folder from the PUBLIC repo 
          # This keeps your sync workflows from being deleted
          git checkout HEAD@{1} -- .github/

          # 3. Clean up any untracked files
          git clean -fd

          # 4. Force push to the public repo
          git add .
          git commit -m "Force sync: Overwritten with private repo content" || echo "No changes to sync"
          git push origin main --force
